name: Update App Content from Website

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC
  workflow_dispatch:        # Also allows manual trigger

permissions:
  contents: write           # Needed to push data.json back to repo

jobs:
  update-content:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run content updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_content.py

      - name: Commit and push if content changed
        run: |
          git config user.name "Youth Riders Bot"
          git config user.email "bot@youth-riders.org.uk"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update: content refreshed $(date +%Y-%m-%d)"
          git push
